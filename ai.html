<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classic Book Recommender</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #f5f1ea, #d9e4dd);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Main App Card */
.app {
    width: 90%;
    max-width: 500px;
    background: white;
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    text-align: center;
    transition: transform 0.2s ease;
}

.app:hover {
    transform: translateY(-3px);
}

/* Title */
h1 {
    margin-bottom: 5px;
    font-size: 1.8rem;
    color: #2c2c2c;
}

p {
    color: #666;
    margin-bottom: 20px;
}

/* Input */
input {
    width: 85%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 1rem;
    transition: 0.2s;
}

input:focus {
    border-color: #555;
    box-shadow: 0 0 8px rgba(0,0,0,0.1);
}

/* Button */
button {
    margin-top: 15px;
    padding: 12px 22px;
    border: none;
    border-radius: 25px;
    background: #2c2c2c;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #444;
    transform: scale(1.03);
}

/* Result Card */
#result {
    margin-top: 25px;
    padding: 20px;
    border-radius: 12px;
    background: #f7f7f7;
    font-size: 1.1rem;
    color: #333;
    min-height: 40px;
}

/* Small label style */
.label {
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="app">
    <h1>📚 Classic Book Recommender</h1>
    <div class="label">Enter a season: Spring, Summer, Fall, Winter</div>

    <input type="text" id="seasonInput" placeholder="e.g. Fall">

    <br>

    <button onclick="recommendBook()">Get Recommendation</button>

    <div id="result"></div>
</div>

<script>
function recommendBook() {
    let input = document.getElementById("seasonInput").value.toLowerCase();
    let result = document.getElementById("result");

    const books = {
        spring: [
            "🌸 The Secret Garden by Frances Hodgson Burnett",
            "🌸 Anne of Green Gables by L. M. Montgomery",
            "🌸 A Room with a View by E. M. Forster",
            "🌸 The Wind in the Willows by Kenneth Grahame"
        ],
        summer: [
            "☀️ The Great Gatsby by F. Scott Fitzgerald",
            "☀️ To Kill a Mockingbird by Harper Lee",
            "☀️ Rebecca by Daphne du Maurier",
            "☀️ The Sun Also Rises by Ernest Hemingway"
        ],
        fall: [
            "🍂 Dracula by Bram Stoker",
            "🍂 Frankenstein by Mary Shelley",
            "🍂 The Picture of Dorian Gray by Oscar Wilde",
            "🍂 Jane Eyre by Charlotte Brontë"
        ],
        winter: [
            "❄️ Little Women by Louisa May Alcott",
            "❄️ A Christmas Carol by Charles Dickens",
            "❄️ The Lion, the Witch and the Wardrobe by C. S. Lewis",
            "❄️ The Giver by Lois Lowry"
        ]
    };

    if (books[input]) {
        let randomBook = books[input][Math.floor(Math.random() * books[input].length)];
        result.innerHTML = "✨ <strong>Your recommendation:</strong><br><br>" + randomBook;
    } else {
        result.innerHTML = "⚠️ Please enter: Spring, Summer, Fall, or Winter.";
    }
}
</script>

</body>
</html>
